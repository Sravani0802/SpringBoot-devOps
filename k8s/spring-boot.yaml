apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: springboot-app
  template:
    metadata:
      labels:
        app: springboot-app
    spec:
      containers:
        - name: springboot-app
          image:  138383657739.dkr.ecr.ap-south-1.amazonaws.com/springboot-devops-app:latest
          ports:
            - containerPort: 9090
          env:
            - name: SERVER_PORT
              value: "9090" 
            - name: DB_URL
              value: jdbc:mysql://springboot-rds.c78482kkuuyb.ap-south-1.rds.amazonaws.com:3306/student?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: password

---

apiVersion: v1
kind: Service
metadata:
  name: springboot-service
spec:
  type: ClusterIP
  selector:
    app: springboot-app
  ports: 
    - port: 80
      targetPort: 9090
